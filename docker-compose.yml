services:
  db:
    image: postgres:18.3
    container_name: f1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: formula1_db
    ports:
      - "5436:5432"
    volumes:
      - ./exercicios:/home/exercicios:ro
      - ./db/data:/var/lib/postgresql
      - ./dados:/dir/local:ro
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 300s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: green_check_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: formula1_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    command: python server.py

